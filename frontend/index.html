<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeeroStock Inventory Search</title>
    <link rel="stylesheet" href="style.css">
    </head>
    <body>
    <div class="container">
        <h1>ZeeroStock Inventory Search</h1>
        
        <form id="search-form">
        <div class="form-group">
            <label for="q">Product Name</label>
            <input type="text" id="q" placeholder="e.g., chair">
        </div>
        
        <div class="form-group">
            <label for="category">Category</label>
            <select id="category">
            <option value="">All Categories</option>
            <option value="Furniture">Furniture</option>
            <option value="Electronics">Electronics</option>
            <option value="Office Supplies">Office Supplies</option>
            </select>
        </div>

        <div class="form-group">
            <label for="minPrice">Min Price ($)</label>
            <input type="number" id="minPrice" placeholder="0">
        </div>

        <div class="form-group">
            <label for="maxPrice">Max Price ($)</label>
            <input type="number" id="maxPrice" placeholder="500">
        </div>

        <button type="submit">Search</button>
        </form>

        <div id="results-container">
        <h2>Results</h2>
        <div id="error-message" class="error hidden"></div>
        
        <table id="results-table" class="hidden">
            <thead>
            <tr>
                <th>Product Name</th>
                <th>Category</th>
                <th>Price</th>
                <th>Supplier</th>
            </tr>
            </thead>
            <tbody id="results-body">
            </tbody>
        </table>
        
        <p id="no-results" class="hidden">No results found.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
